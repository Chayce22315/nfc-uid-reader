name: Build iOS IPA (unsigned, sideloadable)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-26

    steps:
      # 1️⃣ checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ setup Xcode 26.3 explicitly
      - name: Setup Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      # 3️⃣ install XcodeGen
      - name: Install XcodeGen
        run: brew install xcodegen

      # 4️⃣ generate project
      - name: Generate project
        run: xcodegen generate

      # 5️⃣ archive app (unsigned)
      - name: Archive app
        run: |
          xcodebuild \
          -scheme NFCUIDReader \
          -sdk iphoneos \
          -configuration Release \
          -archivePath $PWD/build/NFCUIDReader.xcarchive \
          archive \
          CODE_SIGNING_ALLOWED=NO

      # 6️⃣ manually package IPA (clean, sideloadable)
      - name: Package IPA manually
        run: |
          cd build
          rm -rf Payload
          mkdir Payload
          cp -r NFCUIDReader.xcarchive/Products/Applications/NFCUIDReader.app Payload/
          find Payload -name ".DS_Store" -delete
          cd Payload
          zip -r ../NFCUIDReader.ipa *
          cd ..

      # 7️⃣ upload IPA as artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NFCUIDReader-IPA
          path: build/NFCUIDReader.ipa