name: Build iOS IPA (unsigned, sideloadable)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1️⃣ checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ install xcodegen
      - name: Install XcodeGen
        run: brew install xcodegen

      # 3️⃣ generate Xcode project
      - name: Generate project
        run: xcodegen generate

      # 4️⃣ archive app (unsigned)
      - name: Archive app
        run: |
          xcodebuild \
          -scheme NFCUIDReader \
          -sdk iphoneos \
          -configuration Release \
          -archivePath $PWD/build/NFCUIDReader.xcarchive \
          archive \
          CODE_SIGNING_ALLOWED=NO

      # 5️⃣ package IPA manually (clean for zsign / Scarlet)
      - name: Package IPA manually
        run: |
          cd build
          rm -rf Payload
          mkdir Payload
          cp -r NFCUIDReader.xcarchive/Products/Applications/NFCUIDReader.app Payload/

          # remove mac junk files
          find Payload -name ".DS_Store" -delete

          # zip contents of Payload (important: * not Payload folder itself)
          cd Payload
          zip -r ../NFCUIDReader.ipa *
          cd ..

      # 6️⃣ upload IPA as artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NFCUIDReader-IPA
          path: build/NFCUIDReader.ipa