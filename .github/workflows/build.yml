name: Build iOS IPA (unsigned, sideloadable)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1️⃣ checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ install xcodegen
      - name: Install XcodeGen
        run: brew install xcodegen

      # 3️⃣ generate Xcode project
      - name: Generate project
        run: xcodegen generate

      # 4️⃣ archive app (unsigned)
      - name: Archive app
        run: |
          xcodebuild \
          -scheme NFCUIDReader \
          -sdk iphoneos \
          -configuration Release \
          -archivePath $PWD/build/NFCUIDReader.xcarchive \
          archive \
          CODE_SIGNING_ALLOWED=NO

      # 5️⃣ package IPA manually
      - name: Package IPA manually
        run: |
          cd build
          mkdir -p Payload
          cp -r NFCUIDReader.xcarchive/Products/Applications/NFCUIDReader.app Payload/
          zip -r NFCUIDReader.ipa Payload

      # 6️⃣ upload IPA as artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NFCUIDReader-IPA
          path: build/NFCUIDReader.ipa